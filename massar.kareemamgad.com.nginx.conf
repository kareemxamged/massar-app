# /etc/nginx/sites-available/massar.kareemamgad.com
# Managed by: Certbot (SSL blocks are auto-updated — do not edit SSL lines manually)

# ── Gzip ────────────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml+rss;

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name massar.kareemamgad.com;

    # Certbot challenge (required for SSL issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main block ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name massar.kareemamgad.com;

    # ── SSL — managed by Certbot ─────────────────────────────────────────────
    # Certbot will automatically add/update the lines below after you run it.
    # ssl_certificate     /etc/letsencrypt/live/massar.kareemamgad.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/massar.kareemamgad.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header X-Content-Type-Options "nosniff"               always;

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~* \.(env|log|sql)$ {
        deny all;
        return 404;
    }

    # ── Proxy to PM2 / serve on port 3000 ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass                 $http_upgrade;

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
